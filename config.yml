log: 'mcp-postgresql.log'
log_level: 'info'

postgresql:
  host: 'localhost'
  user: 'postgres'
  password: ''
  port: 5432
  database: 'postgres'
  schema: 'public'
  sslmode: 'disable'
  dsn: ''
  read_only: false
  query_timeout: 30

http:
  host: '127.0.0.1'
  port: 8080
  endpoint: '/mcp'
  auth_token: ''
  allowed_origins: []

